<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <title>KINXKit Desktop</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <style>
    body{margin:0;font-family:system-ui,Segoe UI,Arial}
    header{background:#0d47a1;color:#fff;padding:10px 16px;display:flex;align-items:center;gap:16px}
    header button{background:#1976d2;color:#fff;border:0;padding:6px 12px;border-radius:4px;cursor:pointer}
    main{display:grid;grid-template-columns:1fr 1fr;gap:16px;padding:16px}
    section{border:1px solid #ddd;border-radius:6px;padding:12px}
    h2{margin:0 0 8px 0;font-size:16px}
    label{display:block;margin:6px 0 2px}
    input,select,textarea{width:100%;padding:6px;border:1px solid #ccc;border-radius:4px}
    textarea{height:140px}
    footer{padding:8px 16px;border-top:1px solid #eee;display:flex;justify-content:space-between}
    .row{display:flex;gap:8px}
    .row > *{flex:1}
    .log{white-space:pre-wrap;background:#111;color:#0f0;padding:8px;border-radius:4px;height:240px;overflow:auto}
    .toolbar{display:flex;gap:8px;margin-top:8px}
    .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#323232;color:#fff;padding:8px 12px;border-radius:4px;opacity:0;transition:.2s;pointer-events:none}
    .toast.show{opacity:1}
  </style>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; img-src 'self' data:;">
</head>
<body>
  <header>
    <strong>KINXKit Desktop</strong>
    <button id="btnDetect">环境检测</button>
    <button id="btnDiagnose">系统诊断</button>
  </header>
  <main>
    <section>
      <h2>项目创建</h2>
      <label>项目名称</label>
      <input id="projName" placeholder="my-project">
      <div class="row">
        <div>
          <label>项目类型</label>
          <select id="projType">
            <option value="ai_chatbot">AI聊天机器人</option>
            <option value="api_service">API服务</option>
            <option value="web_app">Web应用</option>
            <option value="utility">工具/脚本</option>
          </select>
        </div>
        <div>
          <label>启用GPU</label>
          <select id="projGpu">
            <option value="false">否</option>
            <option value="true">是</option>
          </select>
        </div>
      </div>
      <label>生成路径</label>
      <input id="projPath" placeholder="./my-project">
      <label>描述</label>
      <input id="projDesc" placeholder="Auto-generated by KINXKit">
      <div class="toolbar">
        <button id="btnCreate">创建项目</button>
      </div>
    </section>

    <section>
      <h2>Docker 管理</h2>
      <label>项目路径</label>
      <input id="dockPath" placeholder="./my-project">
      <div class="toolbar">
        <button id="btnUp">启动</button>
        <button id="btnDown">停止</button>
        <button id="btnStatus">状态</button>
      </div>
      <div id="statusArea" style="margin-top:8px"></div>
    </section>

    <section>
      <h2>配置预设（AI）</h2>
      <label>服务</label>
      <select id="aiService">
        <option value="openai">OpenAI</option>
        <option value="deepseek">DeepSeek</option>
        <option value="zhipu">智谱</option>
        <option value="anthropic">Anthropic</option>
        <option value="azure-openai">Azure OpenAI</option>
        <option value="moonshot">Moonshot</option>
      </select>
      <label>API Key</label>
      <input id="aiKey" placeholder="sk-...">
      <label>模型（可选）</label>
      <input id="aiModel" placeholder="gpt-4o / deepseek-chat 等">
      <div class="toolbar">
        <button id="btnApplyAi">保存到 .env</button>
      </div>
    </section>

    <section>
      <h2>数据库预设管理</h2>
      <div class="row">
        <div>
          <label>Host</label><input id="dbHost" placeholder="localhost">
        </div>
        <div>
          <label>Port</label><input id="dbPort" placeholder="5432">
        </div>
      </div>
      <div class="row">
        <div>
          <label>Database</label><input id="dbName" placeholder="mydb">
        </div>
        <div>
          <label>User</label><input id="dbUser" placeholder="user">
        </div>
      </div>
      <label>Password</label><input id="dbPass" type="password" placeholder="password">
      <div class="row">
        <div>
          <label>保存目录</label><input id="dbDir" placeholder="./my-project">
        </div>
        <div style="align-self:end">
          <button id="btnPickDbDir">选择路径</button>
        </div>
      </div>
      <div class="toolbar">
        <button id="btnSaveDbPreset">保存预设(JSON)</button>
      </div>
    </section>

    <section>
      <h2>日志系统</h2>
      <div class="row">
        <div>
          <label>日志目录</label><input id="logDir" placeholder="">
        </div>
        <div style="align-self:end">
          <button id="btnPickLogDir">浏览</button>
        </div>
      </div>
      <div class="toolbar">
        <button id="btnApplyLog">应用设置</button>
        <div style="flex:1"></div>
        <div style="display:flex;align-items:center;gap:8px">
          <label>过滤级别</label>
          <select id="logFilter">
            <option value="debug">Debug</option>
            <option value="info" selected>Info</option>
            <option value="warn">Warn</option>
            <option value="error">Error</option>
          </select>
        </div>
      </div>
      <div id="log" class="log"></div>
    </section>

    <section style="grid-column:1 / span 2">
      <h2>诊断结果可视化</h2>
      <div class="row">
        <div>
          <label>图表类型</label>
          <select id="chartType">
            <option value="line">折线图</option>
            <option value="bar">柱状图</option>
            <option value="pie">饼图</option>
          </select>
        </div>
        <div>
          <label>轮询间隔（秒）</label>
          <input id="pollSec" value="5">
        </div>
      </div>
      <div class="toolbar">
        <button id="btnStartPoll">开始自动刷新</button>
        <button id="btnStopPoll">停止</button>
        <button id="btnRefreshChart">手动刷新</button>
        <div style="flex:1"></div>
        <button id="btnExportPng">导出 PNG</button>
        <button id="btnExportPdf">导出 PDF</button>
      </div>
      <canvas id="diagChart" height="140"></canvas>
    </section>

    <section style="grid-column:1 / span 2">
      <h2>GitHub 集成</h2>
      <label>项目路径</label><input id="ghPath" placeholder="./my-project">
      <label>仓库名称</label><input id="ghName" placeholder="my-project">
      <label>描述</label><input id="ghDesc" placeholder="">
      <label>私有仓库</label>
      <select id="ghPrivate"><option value="false">否</option><option value="true">是</option></select>
      <div class="toolbar"><button id="btnGhCreate">创建并推送</button></div>
    </section>
  </main>
  <footer>
    <div id="status">Ready</div>
    <div>Windows .exe 打包可用</div>
  </footer>
  <div id="toast" class="toast"></div>
  <script src="./renderer.js"></script>
</body>
</html>
